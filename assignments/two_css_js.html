<html>
  <head>
    <title>Skill Matrix</title>
     <link rel="stylesheet" href="style.css">
    <script>
function validateSkills() {
        const availableLanguages = ["C", "HTML", "JAVA", "PYTHON"];
        let validChoice = false;
        while (!validChoice) {
            let choice = prompt("Hello! Enter a Core Language to verify availability:");
          
            if (choice === null) break; 
            if (availableLanguages.includes(choice.toUpperCase().trim())) {
                alert("Yes, " + choice + " is available in our Skill Matrix!");
                validChoice = true;
            } else {
                alert("Sorry, '" + choice + "' is not available in the Skill matrix");
            }
        }
    }

    window.onload = validateSkills;
    </script>
  </head>
  <body>
     <a href="https://sanashaikh171.github.io/sem4-fet/">Back To Home Page</a>
    <h1>My Technical Skills Matrix</h1>
    <ol>
     <li class="core">Core Languages
      <ul>
        <li>C</li>
        <li>Html</li>
        <li>Java</li>
        <li>Python</li>
      </ul>
      </li>
      <li class="core">Tools & Technologies
      <ul>
        <li>GitHub</li>
        <li>VS Code</li>
        <li>Jira</li>
      </ul>
     </li>
    </ol>

  </body>
</html>
