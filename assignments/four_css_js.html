<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM Loop Demo</title>
  <style>

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
     background: linear-gradient(to bottom right, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .atm-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      text-align: center;
      width: 100%;
      max-width: 350px;
    }

    h2 {
      color: #1e3c72;
      margin-bottom: 10px;
    }

    p {
      color: #636e72;
      margin-bottom: 30px;
    }

    button {
      background: linear-gradient(to right, #00b09b, #96c93d);
      color: white;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 176, 155, 0.4);
    }
    .home-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            transition: 0.3s;
        }

        .home-btn:hover {
            background: white;
            color: #6a11cb;
        }
  </style>
</head>
<body>
  <a href="https://sanashaikh171.github.io/sem4-fet/" class="home-btn">Home</a>
  <div class="atm-container">
    <h2>Secure ATM</h2>
    <p>Click the button below to start your transaction loop.</p>
    <button onclick="startATM()">Open ATM Menu</button>
  </div>
  <script src="atm_logic.js"> </script>
</body>
</html>
