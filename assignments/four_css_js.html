<!DOCTYPE html>
<html>
<head>
  <title>Z-index</title>
<style>
  body { background: linear-gradient(135deg, #667eea 0%, #764bb2 100%);
           font-family: sans-serif;
            text-align: center;
           padding: 50px;
           color:white }

  .stage {
    position: relative; 
    width: 300px;
    height: 300px;
    background: white;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }
  .layer {
    position: absolute;
    width: 200px;
    height: 200px;
    top: 50px;
    left: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: white;
    border-radius: 15px;
    transition: z-index 0.1s, transform 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  #layerA { background: #FF5722; z-index: 3; } 
  #layerB { background: #FFEB3B; z-index: 2; color: #333; }
  #layerC { background: #2196F3; z-index: 1; }

  .controls { margin-top: 20px; }
  button { padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; }
</style>
</head>
<body>

<h2>Z-Index </h2>
<p>Click a button to bring that layer to the front, hiding the others behind it.</p>

<div class="stage">
  <div id="layerA" class="layer">A</div>
  <div id="layerB" class="layer">B</div>
  <div id="layerC" class="layer">C</div>
</div>

<div class="controls">
  <button onclick="showOnly('layerA')">Show A</button>
  <button onclick="showOnly('layerB')">Show B</button>
  <button onclick="showOnly('layerC')">Show C</button>
</div>

<script>
  function showOnly(id) {
    const layers = document.querySelectorAll('.layer');
    layers.forEach(layer => {
      layer.style.zIndex = "1";
     
    });
    const activeLayer = document.getElementById(id);
    activeLayer.style.zIndex = "10";
    activeLayer.style.transform = "scale(1)";
  }
</script>

</body>
</html>
