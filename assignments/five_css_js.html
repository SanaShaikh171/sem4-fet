<html>
<head>
<title>Feedback Form</title>
<style>
      
body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;    
    min-height: 100vh;      
    background: linear-gradient(to bottom right, #6a11cb, #2575fc);
    flex-direction: column;  
}

 * { box-sizing: border-box;
           }
.form {
    max-width: 500px;
    width: 95%; 
   
    background: rgba(255, 255, 255, 0.15); 
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); 
}
  label { 
    color: #ffffff; 
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 8px;
    display: block;
}

h1 {
    font-weight: 700;
    letter-spacing: -1px;
    color:white;
}

 input[type=text], select, textarea {
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid #D2B48C;
            background-color: white;
            border-radius: 4px;
            padding: 10px;
        }
input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: #6a11cb;
    box-shadow: 0 0 8px rgba(106, 17, 203, 0.2);
}
      input[type="submit"] {
    width: 100%;
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    color: white;
    padding: 14px;
    border: non
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
}
input[type=text], select, textarea {
    background: rgba(255, 255, 255, 0.9);
    border: none;
    border-radius: 10px;
    padding: 12px;
    transition: all 0.3s ease;
}

input[type="text"]:focus, select:focus, textarea:focus {
    background: #ffffff;
    transform: scale(1.02);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
}
input[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
}
   .home-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    text-decoration: none;
    padding: 8px 20px;
    border-radius: 30px;
    border: 1.5px solid rgba(255, 255, 255, 0.5);
    font-weight: 500;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px); 
    z-index: 1000;
    display: inline-block;
}

.home-btn:hover {
    background-color: white;
    color: #6a11cb; 
}
fieldset {
   
    border: 1px solid rgba(255, 255, 255, 0.3) !important;
    padding: 15px !important;
}

legend {
    color: white !important; 
    font-size: 0.85rem;
    
    letter-spacing: 1px;
}

    </style>
</head>
<body>
    <a href="https://sanashaikh171.github.io/sem4-fet/" class="home-btn">Home</a>
    <h1>Feedback Form</h1>
    <div class="form">
        <form id="feedbackForm">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" required>

            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" required>
            <fieldset style="border: 1px solid #D2B48C; border-radius: 8px; margin-bottom: 15px; padding: 10px;">
                <legend style="padding: 0 10px; color: #6a11cb; font-weight: bold;">Favourite Core Language</legend>
    
                <input type="radio" id="html" name="fav_language" value="HTML">
                <label for="html" style="margin-right: 15px;">HTML</label>
    
                <input type="radio" id="css" name="fav_language" value="CSS">
                <label for="css">CSS</label>
            </fieldset>
            <label for="rate">Rating:</label>
            <select id="rate" name="rate">
                <option value="Excellent">Excellent</option>
                <option value="Good">Good</option>
                <option value="Average">Average</option>
            </select>
        <fieldset style="border: 1px solid #D2B48C; border-radius: 8px; margin-bottom: 15px; padding: 10px;">
            <legend style="padding: 0 10px; color: #6a11cb; font-weight: bold;">Application Areas</legend>
    
            <input type="checkbox" id="lang1" name="application" value="Websites">
            <label for="lang1" style="margin-right: 15px;">Websites</label>
    
            <input type="checkbox" id="lang2" name="application" value="Animation">
            <label for="lang2">Animation</label>
        </fieldset>
            <label for="message">Why do you like it:</label>
            <textarea id="message" name="message" placeholder="Write something.." required></textarea>

            <input type="submit" value="Submit">
        </form>
    </div>

    <div id="responseContainer"></div>

    <script>
  const myForm = document.getElementById('feedbackForm');
const responseContainer = document.getElementById('responseContainer');

myForm.addEventListener('submit', function(event) {
    event.preventDefault();

    const fname = document.getElementById('fname').value;
    const lname = document.getElementById('lname').value;
    const rating = document.getElementById('rate').value;
    const message = document.getElementById('message').value;

    const favLang = document.querySelector('input[name="fav_language"]:checked')?.value || "None selected";

    const checkboxes = document.querySelectorAll('input[name="application"]:checked');
    let apps = [];
    
    for (let box of checkboxes) {
        apps.push(box.value);
    }
    responseContainer.innerHTML = `
        <div style="border: 2px solid rgba(210, 180, 140, 0.8); padding: 30px; margin: 40px auto; background-color: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); border-radius: 14px; width: 95%; max-width: 750px; color: white; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);">
            <h2 style="text-align: center; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 15px;">Submission Success!</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <p><strong>Name:</strong> ${fname} ${lname}</p>
                <p><strong>Language:</strong> ${favLang}</p>
                <p><strong>Rating:</strong> ${rating}</p>
                <p><strong>Applications:</strong> ${apps.length > 0 ? apps.join(', ') : "None selected"}</p>
            </div>
            <p style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;"><strong>Feedback:</strong> ${message}</p>
        </div>
    `;
});
    </script>
</body>
</html>
