<html>
<head>
    <title>Feedback Form</title>
    <style>
       
        body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;    
    min-height: 100vh;      
    background: linear-gradient(to bottom right, #6a11cb, #2575fc);
    flex-direction: column;  
}

        * { box-sizing: border-box;
           }

     .form {
    max-width: 500px;
    width: 90%; 
    background-color: rgba(255, 255, 255, 0.85);
    padding: 30px;
    border-radius: 14px;
    border: 2px solid #D2B48C;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
}
        label { color: #333333; margin-bottom: 5px; display: inline-block; }
        h1 {
    color: white;
    margin-bottom: 30px; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

        input[type=text], select, textarea {
            width: 100%;
            margin-bottom: 15px;
         border: 1px solid #D2B48C;
    background-color: white;
            border-radius: 4px;
            padding: 10px;
        }
        input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: #6a11cb;
    box-shadow: 0 0 8px rgba(106, 17, 203, 0.2);
}
      input[type="submit"] {
    width: 100%;
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    color: white;
    padding: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
}

input[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
}
   .home-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    text-decoration: none;
    padding: 8px 20px;
    border-radius: 30px;
    border: 1.5px solid rgba(255, 255, 255, 0.5);
    font-weight: 500;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px); 
}

.home-btn:hover {
    background-color: white;
    color: #6a11cb; 
}


    </style>
</head>
<body>

    <a href="https://sanashaikh171.github.io/sem4-fet/" class="home-btn">Home</a>

    <h1>Feedback Form</h1>

    <div class="form">
        <form id="feedbackForm">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" required>

            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" required>

           
                <label>Favourite Core Language</label><br>
                <input type="radio" id="html" name="fav_language" value="HTML">
                <label for="html">HTML</label>
                <input type="radio" id="css" name="fav_language" value="CSS">
                <label for="css">CSS</label>
          <br>

            <label for="rate">Rating:</label>
            <select id="rate" name="rate">
                <option value="Excellent">Excellent</option>
                <option value="Good">Good</option>
                <option value="Average">Average</option>
            </select>

            
                <label>Application Areas</label>
                <br>
                <input type="checkbox" id="lang1" name="application" value="Websites">
                <label for="lang1">Websites</label>
                <input type="checkbox" id="lang2" name="application" value="Animation">
                <label for="lang2">Animation</label>
        <br>

            <label for="message">Why do you like it:</label>
            <textarea id="message" name="message" placeholder="Write something.." required></textarea>

            <input type="submit" value="Submit">
        </form>
    </div>

    <div id="responseContainer"></div>

    <script>
        const myForm = document.getElementById('feedbackForm');
        const responseContainer = document.getElementById('responseContainer');

        myForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const fname = document.getElementById('fname').value;
            const lname = document.getElementById('lname').value;
            const rating = document.getElementById('rate').value;
            const message = document.getElementById('message').value;

     
            const favLang = document.querySelector('input[name="fav_language"]:checked')?.value || "None";

       
            const checkboxes = document.querySelectorAll('input[name="application"]:checked');
            let apps = [];
            for (let i = 0; i < checkboxes.length; i++) {
                apps.push(checkboxes[i].value);
            }
responseContainer.innerHTML = `
    <div style="
        border: 2px solid rgba(210, 180, 140, 0.8); 
        padding: 30px; 
        margin: 40px auto; 
        background-color: rgba(255, 255, 255, 0.2); 
        backdrop-filter: blur(15px); 
        -webkit-backdrop-filter: blur(15px); 
        border-radius: 14px; 
        width: 95%; 
        max-width: 750px; 
        color: white; 
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    ">
        <h2 style="color: #ffffff; margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 15px; text-align: center; letter-spacing: 1px;">Submission Success!</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <p style="margin: 0;"><strong>Name:</strong> ${fname} ${lname}</p>
            <p style="margin: 0;"><strong>Language:</strong> ${favLang}</p>
            <p style="margin: 0;"><strong>Rating:</strong> ${rating}</p>
            <p style="margin: 0;"><strong>Applications:</strong> ${apps.join(', ') || "None"}</p>
        </div>
        
        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);">
            <p style="margin: 0;"><strong>Feedback:</strong> ${message}</p>
        </div>
    </div>
`;
        });
    </script>
</body>
</html>
