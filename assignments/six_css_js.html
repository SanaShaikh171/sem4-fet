<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Settings - Assignment 6</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;    
            min-height: 100vh;      
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .form-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: none;
            background: white;
            color: #333;
            font-size: 1rem;
        }
        .list-box {
            height: 100px;
        }
        #previewBox {
            margin-top: 20px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            transition: 0.3s;
        }

        .home-btn:hover {
            background: white;
            color: #6a11cb;
        }

        .control-group {
            background: rgba(0,0,0,0.1);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <a href="https://sanashaikh171.github.io/sem4-fet/" class="home-btn" target="_blank">Home</a>
    <h1>UI Customizer</h1>
    <div class="form-container">
        <label for="themePicker">Page Theme (Pull-Down):</label>
        <select id="themePicker">
            <option value="linear-gradient(135deg, #6a11cb 0%, #2575fc 100%)">Default Purple</option>
            <option value="linear-gradient(135deg, #232526 0%, #414345 100%)">Midnight Grey</option>
            <option value="linear-gradient(135deg, #1d976c 0%, #93f9b9 100%)">Seafoam Green</option>
        </select>

        <label for="styleList">Text Styles (List Box - Ctrl+Click):</label>
        <select id="styleList" class="list-box" multiple>
            <option value="bold">Bold Font</option>
            <option value="italic">Italicize</option>
            <option value="uppercase">Uppercase</option>
            <option value="underline">Underline</option>
        </select>

        <div class="control-group">
            <label for="textSlider">Text Size: <span id="sizeLabel">18px</span></label>
            <input type="range" id="textSlider" min="14" max="40" value="18">

            <label for="colorPicker">Preview Text Color:</label>
            <input type="color" id="colorPicker" value="#ffffff" style="width:100%; height:40px; border:none; border-radius:5px; background:none; cursor:pointer;">
        </div>

        <div id="previewBox">
            <h3 id="previewTitle">Live Preview</h3>
            <p id="previewPara">Change the settings above to see JavaScript event listeners in action!</p>
        </div>
    </div>

    <script>
        const themePicker = document.getElementById('themePicker');
        const styleList = document.getElementById('styleList');
        const textSlider = document.getElementById('textSlider');
        const colorPicker = document.getElementById('colorPicker');
        const previewBox = document.getElementById('previewBox');
        const sizeLabel = document.getElementById('sizeLabel');
      
        themePicker.addEventListener('change', function() {
            document.body.style.background = this.value;
        });

        styleList.addEventListener('change', function() {
            const selected = Array.from(this.selectedOptions).map(opt => opt.value);
            
            previewBox.style.fontWeight = selected.includes('bold') ? 'bold' : 'normal';
            previewBox.style.fontStyle = selected.includes('italic') ? 'italic' : 'normal';
            previewBox.style.textTransform = selected.includes('uppercase') ? 'uppercase' : 'none';
            previewBox.style.textDecoration = selected.includes('underline') ? 'underline' : 'none';
        });

        textSlider.addEventListener('input', function() {
            previewBox.style.fontSize = this.value + 'px';
            sizeLabel.textContent = this.value + 'px';
        });

        colorPicker.addEventListener('input', function() {
            previewBox.style.color = this.value;
            previewBox.style.borderColor = this.value;
        });
    </script>
</body>
</html>
